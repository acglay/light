<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Prism Sandbox - Layout Fixed</title>
    <style>
        /* レイアウトの強制リセット */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a; /* キャンバスがない時に見える色 */
        }

        /* キャンバスを画面いっぱいに固定 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI操作パネルを最前面に */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #debug-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button onclick="changeShape(0)">▲ プリズム形状</button>
        <button onclick="changeShape(1)">● メタボール形状</button>
    </div>

    <div id="debug-info">Status: Initializing...</div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        const debug = document.getElementById('debug-info');
        let uniforms;

        function changeShape(val) {
            if(uniforms) uniforms.u_shapeMix.value = val;
            debug.innerText = "Status: Shape set to " + (val === 0 ? "Prism" : "Metaball");
        }

        window.onload = () => {
            const container = document.getElementById('canvas-container');
            const width = window.innerWidth;
            const height = window.innerHeight;

            // 1. シーンとレンダラー
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 2. ユニフォーム設定
            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(width, height) },
                u_ior: { value: 1.45 },
                u_dispersion: { value: 0.12 },
                u_shapeMix: { value: 0.0 }
            };

            // 3. シェーダーコード
            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform float u_ior;
                uniform float u_dispersion;
                uniform float u_shapeMix;
                varying vec2 vUv;

                // 形状：三角柱
                float sdTriPrism(vec3 p, vec2 h) {
                    vec3 q = abs(p);
                    return max(q.z-h.y, max(q.x*0.866025+p.y*0.5, -p.y)-h.x*0.5);
                }
                // 形状：球
                float sdSphere(vec3 p, float s) { return length(p) - s; }
                // スムーズ結合
                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                float getDist(vec3 p) {
                    float s = sin(u_time * 0.5), c = cos(u_time * 0.5);
                    p.xz *= mat2(c, -s, s, c);
                    p.yz *= mat2(c, -s, s, c);

                    float d1 = sdTriPrism(p, vec2(0.6, 0.4));
                    float m1 = sdSphere(p - vec3(sin(u_time)*0.5, 0, 0), 0.35);
                    float m2 = sdSphere(p - vec3(cos(u_time)*0.5, 0, 0), 0.35);
                    float d2 = smin(m1, m2, 0.4);
                    
                    return mix(d1, d2, u_shapeMix);
                }

                vec3 getNormal(vec3 p) {
                    vec2 e = vec2(0.001, 0);
                    return normalize(vec3(getDist(p+e.xyy)-getDist(p-e.xyy), getDist(p+e.yxy)-getDist(p-e.yxy), getDist(p+e.yyx)-getDist(p-e.yyx)));
                }

                // 背景色（屈折確認用のグリッド）
                vec3 getBg(vec3 rd) {
                    float grid = smoothstep(0.7, 0.8, sin(rd.x*15.0)*sin(rd.y*15.0));
                    return mix(vec3(0.05, 0.05, 0.1), vec3(0.1, 0.4, 0.8), grid);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 ro = vec3(0, 0, -2.5);
                    vec3 rd = normalize(vec3(uv, 1.2));
                    
                    float dO = 0.0;
                    for(int i=0; i<80; i++) {
                        float dS = getDist(ro + rd * dO);
                        dO += dS;
                        if(dS < 0.001 || dO > 10.0) break;
                    }

                    vec3 color = getBg(rd);

                    if(dO < 10.0) {
                        vec3 p = ro + rd * dO;
                        vec3 n = getNormal(p);
                        
                        // 分光
                        vec3 refr;
                        refr.r = getBg(refract(rd, n, 1.0/(u_ior + u_dispersion))).r;
                        refr.g = getBg(refract(rd, n, 1.0/u_ior)).g;
                        refr.b = getBg(refract(rd, n, 1.0/(u_ior - u_dispersion))).b;
                        
                        float fres = pow(1.0 + dot(rd, n), 3.0);
                        color = refr + fres * 0.4;
                    }
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            // 4. メッシュ作成
            const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            // 5. ループ
            function animate(time) {
                uniforms.u_time.value = time * 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);

            debug.innerText = "Status: Running (Resolution: " + width + "x" + height + ")";

            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                renderer.setSize(w, h);
                uniforms.u_resolution.value.set(w, h);
                debug.innerText = "Status: Resized (" + w + "x" + h + ")";
            });
        };
    </script>
</body>
</html>
