<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Prism - Final Production Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #050505; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* UI Layer */
        #ui { position: absolute; bottom: 30px; left: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .slider-box { width: 80%; max-width: 300px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex-grow: 1; accent-color: #0f0; cursor: pointer; }
        
        #stats { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        .value-label { font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        button { padding: 10px 15px; background: rgba(0,0,0,0.8); color: #0f0; border: 1px solid #0f0; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="stats">
        IOR: <span id="ior-val" class="value-label">1.45</span><br>
        <small>PHYSICS-BASED DISPERSION ACTIVE</small>
    </div>

    <div id="ui">
        <div class="slider-box">
            <span>IOR</span>
            <input type="range" id="ior-slider" min="1.0" max="2.5" step="0.01" value="1.45">
        </div>
        <button onclick="toggleShape()">▲ SHAPE</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let uniforms, renderer, scene, camera, material;
        let shapeMode = 0;

        function toggleShape() {
            shapeMode = 1 - shapeMode;
            uniforms.u_shapeMix.value = shapeMode;
            // メタボール切り替え時にランダムシードを更新
            if(shapeMode === 1) uniforms.u_noiseSeed.value = Math.random() * 100.0;
        }

        const iorSlider = document.getElementById('ior-slider');
        const iorVal = document.getElementById('ior-val');
        iorSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            uniforms.u_ior.value = val;
            iorVal.innerText = val.toFixed(2);
        });

        const handleMove = (e) => {
            const x = (e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) / window.innerHeight;
            const dir = new THREE.Vector2((x - 0.5) * 2.0, (0.5 - y) * 2.0).normalize();
            if(uniforms) uniforms.u_lightDir.value.copy(dir);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);

        window.onload = () => {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(1); // 根本的最適化のためDPIを1に固定
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_lightDir: { value: new THREE.Vector2(0.0, -1.0) }, // デフォルト：真下
                u_ior: { value: 1.45 },
                u_shapeMix: { value: 0.0 },
                u_noiseSeed: { value: Math.random() * 100.0 }
            };

            const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`;

            const fragmentShader = `
                precision highp float; // 精度確保
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_lightDir;
                uniform float u_ior;
                uniform float u_shapeMix;
                uniform float u_noiseSeed;
                varying vec2 vUv;

                #define SAMPLES 7 // 7色
                #define EPS 0.001
                #define MAX_DIST 4.0
                #define BEAM_W 0.0015 // 鋭い光線の幅

                // 虹の7色（赤・橙・黄・緑・青・藍・紫）
                vec3 get7Color(int i) {
                    if(i == 0) return vec3(1.0, 0.1, 0.1); // 赤
                    if(i == 1) return vec3(1.0, 0.5, 0.0); // 橙
                    if(i == 2) return vec3(1.0, 1.0, 0.1); // 黄
                    if(i == 3) return vec3(0.1, 1.0, 0.1); // 緑
                    if(i == 4) return vec3(0.1, 0.5, 1.0); // 青
                    if(i == 5) return vec3(0.3, 0.1, 0.8); // 藍
                    return vec3(0.6, 0.1, 1.0);           // 紫
                }

                // 2D Noise
                float noise(vec2 p) {
                    return fract(sin(dot(p + u_noiseSeed, vec2(12.9898, 78.233))) * 43758.5453);
                }

                // フィレット付き三角形SDF
                float sdRoundedTriangle(vec2 p, float r, float f) {
                    const float k = sqrt(3.0);
                    p.x = abs(p.x) - r; p.y = p.y + r/k;
                    if( p.x+k*p.y>0.0 ) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
                    p.x -= clamp( p.x, -2.0*r, 0.0 );
                    return -length(p)*sign(p.y) - f;
                }
                
                float sdCircle(vec2 p, float r) { return length(p) - r; }
                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                // メタボールの界面定義（ランダム・複雑）
                float sdMetaballs(vec2 p) {
                    // 背骨 Noise
                    float d = sdCircle(p, 0.4); 
                    // 5つの大きな円
                    d = smin(d, sdCircle(p - vec2(0.2, 0.1), 0.1), 0.2);
                    d = smin(d, sdCircle(p - vec2(-0.2, -0.1), 0.15), 0.2);
                    d = smin(d, sdCircle(p - vec2(0.0, 0.3), 0.1), 0.2);
                    d = smin(d, sdCircle(p - vec2(0.3, -0.3), 0.1), 0.2);
                    d = smin(d, sdCircle(p - vec2(-0.3, 0.3), 0.1), 0.2);
                    // 小さな円をばらまく
                    d = smin(d, sdCircle(p - vec2(noise(p)*0.4 - 0.2, noise(p+10.0)*0.4 - 0.2), 0.05), 0.1);
                    d = smin(d, sdCircle(p - vec2(noise(p+20.0)*0.4 - 0.2, noise(p+30.0)*0.4 - 0.2), 0.05), 0.1);
                    // 界面にノイズを加算して複雑化
                    d += (noise(p * 20.0) - 0.5) * smoothstep(0.01, 0.0, abs(d)) * 0.1;
                    return d;
                }

                float map(vec2 p) {
                    // 回転停止、中央固定、大型化
                    mat2 rot = mat2(1, 0, 0, 1);
                    float d1 = sdRoundedTriangle(p * rot, 0.45, 0.05); // 大型化・中央固定
                    float d2 = sdMetaballs(p * rot); // 大型化・中央固定
                    return mix(d1, d2, u_shapeMix);
                }

                vec2 getNormal(vec2 p) {
                    vec2 e = vec2(0.001, 0);
                    return normalize(vec2(map(p+e.xy)-map(p-e.xy), map(p+e.yx)-map(p-e.yx)));
                }

                float aaLine(vec2 p, vec2 a, vec2 b, float w) {
                    vec2 pa = p - a, ba = b - a;
                    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
                    float d = length(pa - ba * h);
                    return smoothstep(w + 0.002, w, d); // 分析的AA
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 col = vec3(0.0);
                    
                    vec2 rd = normalize(u_lightDir);
                    vec2 ro = rd * -1.5;

                    // --- [Step 1] ループ前の共通計算 (入射点の特定) ---
                    float tEntry = 0.0;
                    for(int j=0; j<32; j++) {
                        float d = map(ro + rd * tEntry);
                        if(d < EPS || tEntry > MAX_DIST) break;
                        tEntry += d;
                    }

                    if(tEntry < MAX_DIST) {
                        vec2 p1 = ro + rd * tEntry;
                        vec2 n1 = getNormal(p1);
                        
                        // 入射光（鋭いホワイトレーザー）
                        col += vec3(aaLine(uv, ro, p1, BEAM_W) * 0.5);

                        // --- [Step 2] 分光ループ (補間塗りつぶし) ---
                        // ループ回数を7回
