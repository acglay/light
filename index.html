<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Spectral Dispersion Sandbox - Stable Version</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
        button {
            padding: 10px 20px; background: rgba(30, 30, 30, 0.8); color: #fff; 
            border: 1px solid #0f0; cursor: pointer; font-family: monospace; font-size: 12px;
            backdrop-filter: blur(5px);
        }
        button:hover { background: rgba(0, 255, 0, 0.2); }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="setShape(0)">▲ PRISM</button>
        <button onclick="setShape(1)">● METABALL</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let uniforms, renderer, scene, camera, mesh;

        const setShape = (v) => { if(uniforms) uniforms.u_shapeMix.value = v; };

        function init() {
            const container = document.getElementById('canvas-container');
            const width = window.innerWidth;
            const height = window.innerHeight;

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(width, height) },
                u_ior: { value: 1.55 },
                u_dispersion: { value: 0.15 },
                u_shapeMix: { value: 0.0 }
            };

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform float u_ior;
                uniform float u_dispersion;
                uniform float u_shapeMix;
                varying vec2 vUv;

                // 負荷が高い場合はここを 64 または 32 に下げてください
                #define SAMPLES 128

                float sdTriangle(vec2 p, float r) {
                    const float k = sqrt(3.0);
                    p.x = abs(p.x) - r;
                    p.y = p.y + r/k;
                    if( p.x+k*p.y>0.0 ) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
                    p.x -= clamp( p.x, -2.0*r, 0.0 );
                    return -length(p)*sign(p.y);
                }
                float sdCircle(vec2 p, float r) { return length(p) - r; }
                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                float map(vec2 p) {
                    float s = sin(u_time * 0.4), c = cos(u_time * 0.4);
                    mat2 rot = mat2(c, -s, s, c);
                    float d1 = sdTriangle(p * rot, 0.18);
                    float m1 = sdCircle(p - vec2(sin(u_time)*0.25, 0), 0.12);
                    float m2 = sdCircle(p - vec2(cos(u_time)*0.25, 0), 0.12);
                    return mix(d1, smin(m1, m2, 0.15), u_shapeMix);
                }

                vec2 getNormal(vec2 p) {
                    vec2 e = vec2(0.001, 0);
                    return normalize(vec2(map(p+e.xy)-map(p-e.xy), map(p+e.yx)-map(p-e.yx)));
                }

                vec3 palette(float t) {
                    vec3 a = vec3(0.5, 0.5, 0.5);
                    vec3 b = vec3(0.5, 0.5, 0.5);
                    vec3 c = vec3(1.0, 1.0, 1.0);
                    vec3 d = vec3(0.0, 0.33, 0.67);
                    return a + b * cos(6.28318 * (c * t + d));
                }

                float dfLine(vec2 p, vec2 a, vec2 b) {
                    vec2 pa = p - a, ba = b - a;
                    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
                    return length(pa - ba * h);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 finalCol = vec3(0.0);
                    
                    vec2 ro = vec2(-0.9, 0.15 * sin(u_time * 0.6));
                    vec2 rd = normalize(vec2(1.0, 0.0));

                    for(int i = 0; i < SAMPLES; i++) {
                        float t = float(i) / float(SAMPLES);
                        vec3 waveCol = palette(t) * (2.5 / float(SAMPLES));
                        float curIOR = u_ior + (t - 0.5) * u_dispersion;

                        // 入射光
                        float dO = 0.0;
                        for(int j=0; j<32; j++) {
                            float dS = map(ro + rd * dO);
                            if(dS < 0.001 || dO > 2.0) break;
                            dO += dS;
                        }

                        if(dO < 2.0) {
                            vec2 p1 = ro + rd * dO;
                            finalCol += waveCol * smoothstep(0.004, 0.0, dfLine(uv, ro, p1)) * 0.1;

                            // 内部屈折
                            vec2 n1 = getNormal(p1);
                            vec2 rd_in = refract(vec3(rd, 0), vec3(n1, 0), 1.0/curIOR).xy;
                            if(length(rd_in) < 0.1) rd_in = reflect(rd, n1); // 全反射

                            float dIn = 0.01;
                            for(int j=0; j<32; j++) {
                                float dS = -map(p1 + rd_in * dIn);
                                if(dS < 0.001 || dIn > 2.0) break;
                                dIn += dS;
                            }
                            vec2 p2 = p1 + rd_in * dIn;
                            finalCol += waveCol * smoothstep(0.004, 0.0, dfLine(uv, p1, p2));

                            // 出射
                            vec2 n2 = getNormal(p2);
                            vec2 rd_out = refract(vec3(rd_in, 0), vec3(-n2, 0), curIOR).xy;
                            if(length(rd_out) > 0.1) {
                                finalCol += waveCol * smoothstep(0.005, 0.0, dfLine(uv, p2, p2 + rd_out * 1.5)) * 1.5;
                            }
                        } else {
                            finalCol += palette(0.5) * smoothstep(0.003, 0.0, dfLine(uv, ro, ro + rd * 2.0)) * (0.1 / float(SAMPLES));
                        }
                    }
                    
                    finalCol += smoothstep(0.005, 0.0, abs(map(uv))) * 0.2;
                    gl_FragColor = vec4(finalCol, 1.0);
                }
            `;

            try {
                const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
                mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
                scene.add(mesh);
            } catch (e) {
                console.error("Shader Error:", e);
            }

            function animate(time) {
                uniforms.u_time.value = time * 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            // GPU準備のため少しだけ待ってから開始
            setTimeout(() => { requestAnimationFrame(animate); }, 100);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            if(!renderer) return;
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
