<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozzy TA Edition - v7.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #010101; font-family: monospace; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: block; }
        #ui { position: absolute; bottom: 25px; left: 0; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
        .slider-box { width: 85%; max-width: 320px; display: flex; color: #0f0; gap: 10px; align-items: center; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 8px; border: 1px solid #0f0; pointer-events: auto; }
        .slider-box span { min-width: 55px; font-size: 9px; font-weight: bold; }
        input[type=range] { flex-grow: 1; accent-color: #0f0; cursor: pointer; }
        .btns { display: flex; gap: 6px; pointer-events: auto; }
        button { padding: 10px 15px; background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 4px; font-weight: bold; font-size: 10px; font-family: inherit; }
        #stats { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 12px; font-weight: bold; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #000; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="stats">
        VERSION: 7.0 (JFA CONCEPT / STATIC)<br>
        IOR: <span id="v-ior">1.45</span><br>
        BOUNCES: <span id="v-bounce">3</span><br>
        RAYS: <span id="v-rays">3</span>
    </div>
    <div id="ui">
        <div class="slider-box"><span>BOUNCE</span><input type="range" id="bounce-s" min="1" max="10" step="1" value="3"></div>
        <div class="slider-box"><span>RAYS</span><input type="range" id="rays-s" min="1" max="12" step="1" value="3"></div>
        <div class="slider-box"><span>IOR</span><input type="range" id="ior-s" min="1.0" max="2.5" step="0.01" value="1.45"></div>
        <div class="btns">
            <button onclick="toggleShape()">SHAPE</button>
            <button onclick="toggleRotate()" id="rot-btn">STOP ROTATION</button>
            <button onclick="resetAll()">RESET</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let uniforms, isRotating = true, accumAngle = 0;
        let startPoint = new THREE.Vector2();

        function toggleRotate() { isRotating = !isRotating; document.getElementById('rot-btn').innerText = isRotating ? "STOP ROTATION" : "START ROTATION"; }
        function toggleShape() { uniforms.u_shapeMix.value = 1.0 - uniforms.u_shapeMix.value; uniforms.u_seed.value = Math.random() * 100.0; }
        function resetAll() {
            isRotating = true; accumAngle = 0;
            uniforms.u_shapeMix.value = 0.0; uniforms.u_ior.value = 1.45; uniforms.u_colorCount.value = 3; uniforms.u_maxBounces.value = 3;
            uniforms.u_rayOrigin.value.set(0, 1.2); uniforms.u_rayDir.value.set(0, -1);
            document.querySelectorAll('input').forEach(i => i.value = i.defaultValue);
            ['v-ior','v-bounce','v-rays'].forEach((id,idx)=>(document.getElementById(id).innerText = [1.45,3,3][idx]));
        }

        const setupInput = (id, target) => {
            document.getElementById(id).addEventListener('input', (e) => {
                const v = parseFloat(e.target.value); uniforms[target].value = v;
                document.getElementById('v-'+id.split('-')[0]).innerText = (id==='ior-s'? v.toFixed(2) : v);
            });
        };
        setupInput('ior-s', 'u_ior'); setupInput('bounce-s', 'u_maxBounces'); setupInput('rays-s', 'u_colorCount');

        const toWorld = (x, y) => {
            const aspect = window.innerWidth / window.innerHeight;
            return new THREE.Vector2((x/window.innerWidth*2-1)*(aspect>1?aspect:1), (1-y/window.innerHeight*2)/(aspect>1?1:aspect));
        };

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('#ui')) return;
            startPoint.copy(toWorld(e.touches[0].clientX, e.touches[0].clientY));
        }, {passive:false});

        window.addEventListener('touchend', (e) => {
            if (e.target.closest('#ui')) return;
            const endPoint = toWorld(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            const dir = new THREE.Vector2().subVectors(endPoint, startPoint);
            if(dir.length() > 0.01) { uniforms.u_rayOrigin.value.copy(startPoint); uniforms.u_rayDir.value.copy(dir.normalize()); }
        }, {passive:false});

        window.onload = () => {
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
            document.body.appendChild(renderer.domElement);

            uniforms = {
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_rayOrigin: { value: new THREE.Vector2(0, 1.2) }, u_rayDir: { value: new THREE.Vector2(0, -1) },
                u_ior: { value: 1.45 }, u_colorCount: { value: 3 }, u_maxBounces: { value: 3 },
                u_shapeMix: { value: 0.0 }, u_angle: { value: 0.0 }, u_seed: { value: 42.0 }
            };

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution, u_rayOrigin, u_rayDir;
                uniform float u_ior, u_colorCount, u_maxBounces, u_shapeMix, u_angle, u_seed;
                #define EPS 0.002
                #define BEAM_W 0.001

                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9, 78.2))) * 43758.5); }
                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }
                float sdRoundedTriangle(vec2 p, float r, float f) {
                    const float k = sqrt(3.0);
                    p.x = abs(p.x) - r; p.y = p.y + r/k;
                    if( p.x+k*p.y>0.0 ) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
                    p.x -= clamp( p.x, -2.0*r, 0.0 );
                    return -length(p)*sign(p.y) - f;
                }

                // JFA-inspired Optimized SDF
                float map(vec2 p) {
                    float s = sin(u_angle), c = cos(u_angle); mat2 rot = mat2(c, -s, s, c);
                    vec2 pr = p * rot;
                    float d1 = sdRoundedTriangle(pr, 0.4, 0.03);
                    float d2 = length(pr) - 0.22;
                    // JFA Concept: シード点ベースのメタボール融合
                    for(int i=0; i<4; i++) {
                        float fi = float(i);
                        vec2 seed = vec2(hash(vec2(fi, u_seed))-0.5, hash(vec2(fi*1.4, u_seed+fi))-0.5) * 0.7;
                        d2 = smin(d2, length(pr - seed) - (0.05 + hash(vec2(fi*1.9))*0.1), 0.35);
                    }
                    return mix(d1, d2, u_shapeMix);
                }

                vec2 getNormal(vec2 p) {
                    vec2 e = vec2(EPS, 0);
                    return normalize(vec2(map(p+e.xy)-map(p-e.xy), map(p+e.yx)-map(p-e.yx)));
                }

                float dfLine(vec2 p, vec2 a, vec2 b) {
                    vec2 pa = p - a, ba = b - a;
                    return length(pa - ba * clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0));
                }

                vec3 getOzzyColor(int i, float total) {
                    if(total <= 3.0) { if(i==0) return vec3(1,0,0); if(i==1) return vec3(0,1,0); return vec3(0,0,1); }
                    if(total <= 5.0) { if(i==0) return vec3(1,0,0); if(i==1) return vec3(1,1,0); if(i==2) return vec3(0,1,0); if(i==3) return vec3(0,1,1); return vec3(0,0,1); }
                    if(total <= 7.0) { if(i==0) return vec3(1,0,0); if(i==1) return vec3(1,0.5,0); if(i==2) return vec3(1,1,0); if(i==3) return vec3(0,1,0); if(i==4) return vec3(0,0.5,1); if(i==5) return vec3(0.3,0,1); return vec3(0.5,0,1); }
                    float f = float(i)/(total-1.0); return 0.5 + 0.5 * cos(6.28318 * (vec3(1,1,1) * f + vec3(0.0, 0.33, 0.67)));
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 col = vec3(0.0);
                    float d_glass = map(uv);
                    if(d_glass < 0.0) col += vec3(0.05, 0.1, 0.12); // 厚みのある塗りつぶし

                    vec2 rd = u_rayDir, ro = u_rayOrigin;
                    float t = 0.0;
                    for(int j=0; j<24; j++) {
                        float d = map(ro + rd * t);
                        if(d < EPS || t > 2.5) break;
                        t += d;
                    }
                    if(t < 2.5) {
                        vec2 p1 = ro + rd * t, n1 = getNormal(p1);
                        col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, p1)) * 0.3);
                        int count = int(u_colorCount);
                        for(int i=0; i<12; i++) {
                            if(i >= count) break;
                            vec3 waveCol = getOzzyColor(i, u_colorCount);
                            float curIOR = u_ior + (float(i)/max(1.0, u_colorCount-1.0) - 0.5) * 0.35;
                            vec2 rP = p1, rD = refract(rd, n1, 1.0/curIOR);
                            if(length(rD) < 0.1) rD = reflect(rd, n1);
                            for(int b=0; b < 10; b++) {
                                if(float(b) >= u_maxBounces) break;
                                float tE = 0.05;
                                for(int s=0; s<8; s++) { // Optimized Sphere Tracing
                                    float d = -map(rP + rD * tE);
                                    if(d < EPS || tE > 1.5) break;
                                    tE += d;
                                }
                                vec2 p2 = rP + rD * tE, n2 = getNormal(p2);
                                col += waveCol * smoothstep(BEAM_W+0.001, BEAM_W, dfLine(uv, rP, p2)) * 0.2;
                                vec2 rO = refract(rD, -n2, curIOR);
                                if(length(rO) < 0.1) { rD = reflect(rD, -n2); rP = p2; }
                                else { col += waveCol * smoothstep(BEAM_W+0.001, BEAM_W, dfLine(uv, p2, p2 + rO * 3.0)); break; }
                            }
                        }
                    } else { col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, ro + rd * 4.0)) * 0.1); }
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const scene = new THREE.Scene();
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.ShaderMaterial({ uniforms, vertexShader: `void main(){gl_Position=vec4(position,1.0);}`, fragmentShader })));
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            function animate() {
                if(isRotating) accumAngle += 0.015;
                uniforms.u_angle.value = accumAngle;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
