<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Final Master Prism</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: monospace; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        #ui { position: absolute; bottom: 30px; left: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .slider-box { width: 85%; max-width: 320px; display: flex; color: #0f0; gap: 10px; align-items: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        input[type=range] { flex-grow: 1; accent-color: #0f0; cursor: pointer; }
        button { padding: 12px 24px; background: rgba(0,0,0,0.8); color: #0f0; border: 1px solid #0f0; border-radius: 5px; font-weight: bold; }
        #stats { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 8px #0f0; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stats">IOR: <span id="ior-val">1.45</span></div>
    <div id="ui">
        <div class="slider-box"><span>IOR</span><input type="range" id="ior-slider" min="1.0" max="2.5" step="0.01" value="1.45"></div>
        <button onclick="toggleShape()">▲ CHANGE SHAPE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let uniforms, shapeMode = 0;

        function toggleShape() {
            shapeMode = 1 - shapeMode;
            uniforms.u_shapeMix.value = shapeMode;
            if(shapeMode === 1) uniforms.u_seed.value = Math.random() * 100.0;
        }

        const iorSlider = document.getElementById('ior-slider');
        iorSlider.addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            uniforms.u_ior.value = v;
            document.getElementById('ior-val').innerText = v.toFixed(2);
        });

        const handleMove = (e) => {
            const x = (e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) / window.innerHeight;
            // 指の方向に光を飛ばす
            const dir = new THREE.Vector2((x - 0.5) * 2.0, (0.5 - y) * 2.0).normalize();
            if(uniforms) uniforms.u_lightDir.value.copy(dir);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchstart', handleMove);
        window.addEventListener('touchmove', handleMove);

        window.onload = () => {
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(1); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_lightDir: { value: new THREE.Vector2(0.0, -1.0) },
                u_ior: { value: 1.45 },
                u_shapeMix: { value: 0.0 },
                u_seed: { value: Math.random() * 10.0 }
            };

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_lightDir;
                uniform float u_ior;
                uniform float u_shapeMix;
                uniform float u_seed;

                #define BEAM_W 0.001
                #define EPS 0.001

                // 物理演算用定数
                float hash(float n) { return fract(sin(n) * 43758.5453); }
                
                float sdRoundedTriangle(vec2 p, float r, float f) {
                    const float k = sqrt(3.0);
                    p.x = abs(p.x) - r; p.y = p.y + r/k;
                    if( p.x+k*p.y>0.0 ) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
                    p.x -= clamp( p.x, -2.0*r, 0.0 );
                    return -length(p)*sign(p.y) - f;
                }

                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                float sdMetaballs(vec2 p) {
                    float d = length(p) - 0.25;
                    for(int i=0; i<5; i++) {
                        float fi = float(i);
                        vec2 off = vec2(hash(fi+u_seed)-0.5, hash(fi*1.7+u_seed)-0.5) * 0.7;
                        d = smin(d, length(p - off) - (0.05 + hash(fi*2.1)*0.1), 0.25);
                    }
                    d += (hash(p.x*20.0 + p.y*20.0 + u_seed) - 0.5) * 0.02; // Complex surface
                    return d;
                }

                float map(vec2 p) {
                    float d1 = sdRoundedTriangle(p, 0.5, 0.04); 
                    float d2 = sdMetaballs(p);
                    return mix(d1, d2, u_shapeMix);
                }

                vec2 getNormal(vec2 p) {
                    vec2 e = vec2(EPS, 0);
                    return normalize(vec2(map(p+e.xy)-map(p-e.xy), map(p+e.yx)-map(p-e.yx)));
                }

                float dfLine(vec2 p, vec2 a, vec2 b) {
                    vec2 pa = p - a, ba = b - a;
                    return length(pa - ba * clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0));
                }

                vec3 get7Color(int i) {
                    if(i==0) return vec3(1,0,0); if(i==1) return vec3(1,0.5,0);
                    if(i==2) return vec3(1,1,0); if(i==3) return vec3(0,1,0);
                    if(i==4) return vec3(0,0.4,1); if(i==5) return vec3(0,0,1);
                    return vec3(0.5,0,1);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 col = vec3(0.0);

                    vec2 rd = normalize(u_lightDir);
                    vec2 ro = rd * -1.5;

                    // 1. 入射点の特定 (ループ外で1回のみ)
                    float t = 0.0;
                    for(int j=0; j<32; j++) {
                        float d = map(ro + rd * t);
                        if(d < EPS || t > 3.0) break;
                        t += d;
                    }

                    if(t < 3.0) {
                        vec2 p1 = ro + rd * t;
                        vec2 n1 = getNormal(p1);
                        
                        // 入射光（鋭いホワイト）
                        col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, p1)) * 0.4);

                        // 2. 出口の特定 (中央の波長で1回のみ)
                        vec2 rd_in_mid = refract(rd, n1, 1.0/u_ior);
                        if(length(rd_in_mid)<0.1) rd_in_mid = reflect(rd, n1);
                        float tE = 0.05;
                        for(int j=0; j<24; j++) {
                            float d = -map(p1 + rd_in_mid * tE);
                            if(d < EPS || tE > 2.0) break;
                            tE += d;
                        }
                        vec2 p2 = p1 + rd_in_mid * tE;
                        vec2 n2 = getNormal(p2);

                        // 3. 7色の分光 & 塗りつぶし (高速演算)
                        float last_angle = 0.0;
                        vec2 last_rd_out = vec2(0);

                        for(int i=0; i<7; i++) {
                            float f = float(i)/6.0;
                            float cur_ior = u_ior + (f - 0.5) * 0.35;
                            vec3 c1 = get7Color(i);
                            
                            // スネルの法則のみ計算
                            vec2 rd_in = refract(rd, n1, 1.0/cur_ior);
                            vec2 rd_out = refract(rd_in, -n2, cur_ior);
                            if(length(rd_out) < 0.1) rd_out = reflect(rd_in, -n2);
                            rd_out = normalize(rd_out);

                            // 光線自体の描画 (常に鋭い)
                            float dL = dfLine(uv, p2, p2 + rd_out * 2.0);
                            col += c1 * smoothstep(BEAM_W+0.001, BEAM_W, dL);

                            // 塗りつぶし (隣の光線との間)
                            if(i > 0) {
                                vec3 c_prev = get7Color(i-1);
                                // 角度ベースの塗りつぶし判定
                                float angle_uv = atan(uv.y - p2.y, uv.x - p2.x);
                                float ang1 = atan(last_rd_out.y, last_rd_out.x);
                                float ang2 = atan(rd_out.y, rd_out.x);
                                
                                // 角度の正規化
                                if(ang2 < ang1) ang2 += 6.28318;
                                if(angle_uv < ang1) angle_uv += 6.28318;

                                if(angle_uv > ang1 && angle_uv < ang2 && length(uv-p2) > 0.01) {
                                    float spread = abs(ang2 - ang1);
                                    float energy = 1.0 / (1.0 + spread * 40.0); // 面積が広がるほど暗くなる
                                    col += mix(c_prev, c1, (angle_uv-ang1)/spread) * 0.6 * energy;
                                }
                            }
                            last_rd_out = rd_out;
                            
                            // 内部パス
                            col += c1 * smoothstep(BEAM_W+0.001, BEAM_W, dfLine(uv, p1, p2)) * 0.2;
                        }
                    } else {
                        // オブジェクト外の光
                        col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, ro + rd * 3.0)) * 0.1);
                    }

                    // 輪郭
                    col += smoothstep(0.003, 0.0, abs(map(uv))) * vec3(0, 1, 0.6) * 0.2;
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const geometry = new THREE.PlaneGeometry(2, 2);
            const material = new THREE.ShaderMaterial({ uniforms, vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`, fragmentShader });
            scene.add(new THREE.Mesh(geometry, material));

            function animate(time) {
                uniforms.u_time.value = time * 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
