<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Prism Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: #0f0; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 10px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; }
        button:hover { background: #555; }
        #console { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; pointer-events: none; max-width: 80%; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="setShape(0)">▲ プリズム</button>
        <button onclick="setShape(1)">● メタボール</button>
    </div>
    <div id="console">Initializing...</div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        const consoleDiv = document.getElementById('console');
        function log(msg) { consoleDiv.innerHTML += "<br>" + msg; console.log(msg); }

        let uniforms;
        function setShape(val) {
            if(uniforms) uniforms.u_shapeMix.value = val;
            log("Shape changed to: " + (val === 0 ? "Prism" : "Metaball"));
        }

        window.onerror = function(msg) { log("<span style='color:red'>Error: " + msg + "</span>"); };

        window.onload = () => {
            log("Window loaded. Starting WebGL...");

            // 1. Scene / Renderer Setup
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            
            try {
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
                log("Canvas added to DOM.");
            } catch(e) {
                log("Renderer setup failed: " + e);
            }

            // 2. Uniforms
            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_ior: { value: 1.5 },
                u_dispersion: { value: 0.1 },
                u_shapeMix: { value: 0.0 }
            };

            // 3. Shaders
            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform float u_ior;
                uniform float u_dispersion;
                uniform float u_shapeMix;
                varying vec2 vUv;

                // SDFs
                float sdTriPrism(vec3 p, vec2 h) {
                    vec3 q = abs(p);
                    return max(q.z-h.y, max(q.x*0.866025+p.y*0.5, -p.y)-h.x*0.5);
                }
                float sdSphere(vec3 p, float s) { return length(p) - s; }
                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                float getDist(vec3 p) {
                    float s = sin(u_time * 0.4), c = cos(u_time * 0.4);
                    mat2 rot = mat2(c, -s, s, c);
                    p.xz *= rot;
                    
                    float prism = sdTriPrism(p, vec2(0.5, 0.4));
                    float m1 = sdSphere(p - vec3(sin(u_time)*0.4, 0, 0), 0.3);
                    float m2 = sdSphere(p - vec3(cos(u_time)*0.4, 0, 0), 0.3);
                    float metaballs = smin(m1, m2, 0.3);
                    
                    return mix(prism, metaballs, u_shapeMix);
                }

                vec3 getNormal(vec3 p) {
                    vec2 e = vec2(0.001, 0);
                    return normalize(vec3(getDist(p+e.xyy)-getDist(p-e.xyy), getDist(p+e.yxy)-getDist(p-e.yxy), getDist(p+e.yyx)-getDist(p-e.yyx)));
                }

                vec3 getBg(vec3 rd) {
                    float g = smoothstep(0.8, 0.9, sin(rd.x*10.0)*sin(rd.y*10.0));
                    return mix(vec3(0.05, 0.05, 0.1), vec3(0.2, 0.6, 1.0), g);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                    vec3 ro = vec3(0, 0, -2.0);
                    vec3 rd = normalize(vec3(uv, 1.0));
                    
                    float dO = 0.0;
                    for(int i=0; i<64; i++) {
                        float dS = getDist(ro + rd * dO);
                        dO += dS;
                        if(dS < 0.001 || dO > 10.0) break;
                    }

                    vec3 col = getBg(rd);
                    if(dO < 10.0) {
                        vec3 p = ro + rd * dO;
                        vec3 n = getNormal(p);
                        
                        vec3 refrR = refract(rd, n, 1.0/(u_ior + u_dispersion));
                        vec3 refrG = refract(rd, n, 1.0/u_ior);
                        vec3 refrB = refract(rd, n, 1.0/(u_ior - u_dispersion));
                        
                        col.r = getBg(refrR).r;
                        col.g = getBg(refrG).g;
                        col.b = getBg(refrB).b;
                        
                        float fres = pow(1.0 + dot(rd, n), 4.0);
                        col += fres * 0.4;
                    }
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            // 4. Material & Mesh
            const material = new THREE.ShaderMaterial({
                uniforms,
                vertexShader,
                fragmentShader
            });

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            log("Shaders compiled and Mesh added.");

            // 5. Animation
            function animate(time) {
                uniforms.u_time.value = time * 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);
            log("Animation loop started.");

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
