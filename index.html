<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spectral Prism - Final Optimized</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: monospace; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui { position: absolute; bottom: 30px; left: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; pointer-events: none; }
        .slider-box { width: 85%; max-width: 320px; display: flex; color: #0f0; gap: 10px; align-items: center; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 20px; border: 1px solid #0f0; pointer-events: auto; }
        input[type=range] { flex-grow: 1; accent-color: #0f0; cursor: pointer; }
        button { padding: 12px 24px; background: rgba(0,0,0,0.9); color: #0f0; border: 1px solid #0f0; border-radius: 8px; font-weight: bold; pointer-events: auto; }
        #stats { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 1.1rem; font-weight: bold; z-index: 100; pointer-events: none; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="stats">IOR: <span id="ior-val">1.45</span></div>
    <div id="ui">
        <div class="slider-box"><span>IOR</span><input type="range" id="ior-slider" min="1.0" max="2.5" step="0.01" value="1.45"></div>
        <button onclick="toggleShape()">▲ CHANGE SHAPE</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let uniforms, shapeMode = 0;

        function toggleShape() {
            shapeMode = 1 - shapeMode;
            uniforms.u_shapeMix.value = shapeMode;
            if(shapeMode === 1) uniforms.u_seed.value = Math.random() * 100.0;
        }

        const iorSlider = document.getElementById('ior-slider');
        iorSlider.addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            uniforms.u_ior.value = v;
            document.getElementById('ior-val').innerText = v.toFixed(2);
        });

        const handleMove = (e) => {
            const x = (e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) / window.innerHeight;
            const dir = new THREE.Vector2((x - 0.5) * 2.0, (0.5 - y) * 2.0).normalize();
            if(uniforms) uniforms.u_lightDir.value.copy(dir);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchstart', handleMove);
        window.addEventListener('touchmove', handleMove);

        window.onload = () => {
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            uniforms = {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_lightDir: { value: new THREE.Vector2(0.0, -1.0) }, // デフォルト真下
                u_ior: { value: 1.45 },
                u_shapeMix: { value: 0.0 },
                u_seed: { value: 42.0 }
            };

            const fragmentShader = `
                precision highp float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_lightDir;
                uniform float u_ior;
                uniform float u_shapeMix;
                uniform float u_seed;

                #define BEAM_W 0.001
                #define EPS 0.001
                #define SAMPLES 7

                vec3 get7Color(int i) {
                    if(i==0) return vec3(1.0, 0.0, 0.0); if(i==1) return vec3(1.0, 0.5, 0.0);
                    if(i==2) return vec3(1.0, 1.0, 0.0); if(i==3) return vec3(0.0, 1.0, 0.0);
                    if(i==4) return vec3(0.0, 0.5, 1.0); if(i==5) return vec3(0.2, 0.0, 0.8);
                    return vec3(0.5, 0.0, 1.0);
                }

                float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
                float noise(vec2 p) {
                    vec2 i = floor(p), f = fract(p);
                    vec2 u = f*f*(3.0-2.0*f);
                    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
                }

                float sdRoundedTriangle(vec2 p, float r, float f) {
                    const float k = sqrt(3.0);
                    p.x = abs(p.x) - r; p.y = p.y + r/k;
                    if( p.x+k*p.y>0.0 ) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
                    p.x -= clamp( p.x, -2.0*r, 0.0 );
                    return -length(p)*sign(p.y) - f;
                }

                float smin(float a, float b, float k) {
                    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                    return mix(b, a, h) - k * h * (1.0 - h);
                }

                float sdMetaballs(vec2 p) {
                    float d = length(p) - 0.2;
                    for(int i=0; i<5; i++) {
                        float fi = float(i);
                        vec2 off = vec2(noise(vec2(fi, u_seed))-0.5, noise(vec2(fi*1.4, u_seed+fi))-0.5) * 0.7;
                        d = smin(d, length(p - off) - (0.05 + noise(vec2(fi*1.9, u_seed))*0.1), 0.25);
                    }
                    d += (noise(p * 12.0 + u_seed) - 0.5) * 0.012; // 滑らかな界面ノイズ
                    return d;
                }

                float map(vec2 p) {
                    float s = sin(u_time*0.3), c = cos(u_time*0.3);
                    mat2 rot = mat2(c, -s, s, c);
                    float d1 = sdRoundedTriangle(p * rot, 0.25, 0.03); 
                    float d2 = sdMetaballs(p * rot);
                    return mix(d1, d2, u_shapeMix);
                }

                vec2 getNormal(vec2 p) {
                    vec2 e = vec2(EPS, 0);
                    return normalize(vec2(map(p+e.xy)-map(p-e.xy), map(p+e.yx)-map(p-e.yx)));
                }

                float dfLine(vec2 p, vec2 a, vec2 b) {
                    vec2 pa = p - a, ba = b - a;
                    return length(pa - ba * clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0));
                }

                // 光線間の包含判定（外積利用）
                float insideBeam(vec2 p, vec2 origin, vec2 v1, vec2 v2) {
                    vec2 pv = p - origin;
                    float cross1 = v1.x * pv.y - v1.y * pv.x;
                    float cross2 = v2.x * pv.y - v2.y * pv.x;
                    return (cross1 > 0.0 && cross2 < 0.0) ? 1.0 : 0.0;
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    vec3 col = vec3(0.0);
                    vec2 rd = normalize(u_lightDir);
                    vec2 ro = rd * -1.5;

                    // 入射点特定
                    float t = 0.0;
                    for(int j=0; j<24; j++) {
                        float d = map(ro + rd * t);
                        if(d < EPS || t > 2.5) break;
                        t += d;
                    }

                    if(t < 2.5) {
                        vec2 p1 = ro + rd * t;
                        vec2 n1 = getNormal(p1);
                        col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, p1)) * 0.4);

                        // 代表出口特定
                        vec2 rd_in_mid = refract(rd, n1, 1.0/u_ior);
                        if(length(rd_in_mid)<0.1) rd_in_mid = reflect(rd, n1);
                        float tE = 0.05;
                        for(int j=0; j<16; j++) tE -= map(p1 + rd_in_mid * tE);
                        vec2 p2 = p1 + rd_in_mid * tE;
                        vec2 n2 = getNormal(p2);

                        vec2 last_rd_out = vec2(0);
                        for(int i=0; i<7; i++) {
                            float f = float(i)/6.0;
                            float cur_ior = u_ior + (f - 0.5) * 0.4;
                            vec3 c1 = get7Color(i);
                            
                            vec2 r_in = refract(rd, n1, 1.0/cur_ior);
                            vec2 r_out = normalize(refract(r_in, -n2, cur_ior));
                            if(length(r_out) < 0.1) r_out = reflect(r_in, -n2);

                            // 光線（シャープ）
                            col += c1 * smoothstep(BEAM_W+0.001, BEAM_W, dfLine(uv, p2, p2 + r_out * 2.0));
                            col += c1 * smoothstep(BEAM_W+0.001, BEAM_W, dfLine(uv, p1, p2)) * 0.2;

                            // 塗りつぶし（外積による扇形判定）
                            if(i > 0) {
                                vec3 c_prev = get7Color(i-1);
                                float mask = insideBeam(uv, p2, last_rd_out, r_out);
                                float spread = length(r_out - last_rd_out);
                                float energy = 1.0 / (1.0 + spread * 40.0);
                                col += mix(c_prev, c1, 0.5) * mask * energy * 0.6;
                            }
                            last_rd_out = r_out;
                        }
                    } else {
                        col += vec3(smoothstep(BEAM_W+0.002, BEAM_W, dfLine(uv, ro, ro + rd * 3.0)) * 0.1);
                    }
                    col += smoothstep(0.003, 0.0, abs(map(uv))) * vec3(0, 1, 0.6) * 0.2;
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const material = new THREE.ShaderMaterial({ uniforms, vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`, fragmentShader });
            const scene = new THREE.Scene();
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            function animate(time) {
                uniforms.u_time.value = time * 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
